  <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>
  <script async src="https://cdn.ampproject.org/v0.js"></script>
  
  <style amp-custom>
    /* Background Maroon Berapi-api */
    body {
      background: radial-gradient(circle, #800000 0%, #300000 100%);
      color: white;
      font-family: 'Arial Black', sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      min-height: 100vh;
    }

    /* Container Logo */
    .logo-container {
      padding-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Membuat Logo Lebih Kelihatan & Menonjol */
    .main-logo {
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5)); /* Memberi pendaran cahaya agar logo jelas */
    }

    /* Tagline Lebih Menarik & Bold */
    .tagline-bold {
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      margin-top: 15px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      /* Efek Glow Kuning agar kontras dengan Maroon */
      text-shadow: 0 0 10px #ffff00, 0 0 20px #ffcc00, 2px 2px 2px #000;
      padding: 0 10px;
    }

    /* Banner */
    .banner-card {
      margin: 20px auto;
      max-width: 380px;
      border: 3px solid #ffff00;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(255, 255, 0, 0.4);
    }

    /* Tombol Hitam Neon Kuning */
    .btn-container {
      padding: 10px 20px;
      max-width: 380px;
      margin: 0 auto;
    }
    
    .btn {
      display: block;
      margin-bottom: 15px;
      padding: 16px;
      text-decoration: none;
      font-weight: 900;
      border-radius: 12px;
      font-size: 22px;
      text-transform: uppercase;
      background-color: #000; 
      color: #fff;
      border: 3px solid #ffff00;
      box-shadow: 0 0 15px #ffff00;
      transition: 0.3s;
    }

    .btn:hover {
      box-shadow: 0 0 30px #ffff00;
      transform: scale(1.03);
    }

    .footer-text {
      font-size: 11px;
      color: #ccc;
      margin-top: 30px;
      padding-bottom: 30px;
    }

    .footer-text span {
      color: #ffff00;
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <amp-img class="main-logo" src="logo.png" width="250" height="100" layout="fixed" alt="TULIP189"></amp-img>
    
    <div class="tagline-bold">
     UNLOCK ELEGANCE | IGNITE YOUR LUCK | SPIN TO WIN!
    </div>
  </div>

  <div class="banner-card">
    <amp-img src="foto.jpg" width="400" height="400" layout="responsive" alt="Banner"></amp-img>
  </div>

  <div class="btn-container">
    <a href="https://tulip189c.ink" class="btn">LOGIN</a>
    <a href="https://tulip189c.ink" class="btn">DAFTAR</a>
  </div>

  <div class="footer-text">
     POWERED BY KIPLI <span>TULIP189</span>
  </div>

</body>
